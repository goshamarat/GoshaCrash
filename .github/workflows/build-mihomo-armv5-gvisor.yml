name: Build Mihomo ARMv5 gVisor

on:
  workflow_dispatch:
    inputs:
      mihomo_ref:
        description: "Official MetaCubeX/mihomo tag or commit"
        required: true
        default: "v1.19.28"

permissions:
  contents: write

jobs:
  build-armv5-gvisor:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout GoshaCrash
        uses: actions/checkout@v4

      - name: Checkout official Mihomo source
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/mihomo
          ref: ${{ inputs.mihomo_ref }}
          path: mihomo-src
          fetch-depth: 1

      - name: Set up Go 1.26
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
          cache-dependency-path: mihomo-src/go.sum

      - name: Prepare variables
        shell: bash
        run: |
          set -euo pipefail
          REF="${{ inputs.mihomo_ref }}"
          VERSION="${REF#v}"
          ASSET="mihomo-linux-armv5-gvisor-v${VERSION}"
          TAG="mihomo-gvisor-armv5-v${VERSION}"

          echo "MIHOMO_REF=${REF}" >> "$GITHUB_ENV"
          echo "MIHOMO_VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=${TAG}" >> "$GITHUB_ENV"
          echo "BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Refresh embedded CA bundle
        shell: bash
        working-directory: mihomo-src
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y ca-certificates qemu-user file
          sudo update-ca-certificates
          cp -f /etc/ssl/certs/ca-certificates.crt component/ca/ca-certificates.crt

      - name: Build static ARMv5 core with gVisor
        shell: bash
        working-directory: mihomo-src
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm
          GOARM: "5"
          GOTOOLCHAIN: local
        run: |
          set -euo pipefail
          go env
          go build \
            -v \
            -tags "with_gvisor" \
            -trimpath \
            -ldflags "-extldflags --static -X 'github.com/metacubex/mihomo/constant.Version=goshacrash-${MIHOMO_REF}' -X 'github.com/metacubex/mihomo/constant.BuildTime=${BUILD_TIME}' -w -s -buildid=" \
            -o "../${ASSET}"

      - name: Verify ARMv5 and gVisor tag
        shell: bash
        run: |
          set -euo pipefail
          file "${ASSET}"
          file "${ASSET}" | grep -Eq 'ARM|arm'
          qemu-arm "./${ASSET}" -v | tee mihomo-version.txt
          grep -Fq 'Use tags: with_gvisor' mihomo-version.txt

      - name: Package and checksum
        shell: bash
        run: |
          set -euo pipefail
          gzip -9 -c "${ASSET}" > "${ASSET}.gz"
          sha256sum "${ASSET}.gz" > "${ASSET}.gz.sha256"
          cat "${ASSET}.gz.sha256"
          rm -f "${ASSET}"

      - name: Upload Actions artifact
        uses: actions/upload-artifact@v4
        with:
          name: mihomo-armv5-gvisor-${{ env.MIHOMO_VERSION }}
          path: |
            ${{ env.ASSET }}.gz
            ${{ env.ASSET }}.gz.sha256
            mihomo-version.txt
          if-no-files-found: error
          retention-days: 30

      - name: Replace GitHub prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release delete "${RELEASE_TAG}" --yes --cleanup-tag
          fi

          gh release create "${RELEASE_TAG}" \
            "${ASSET}.gz" \
            "${ASSET}.gz.sha256" \
            mihomo-version.txt \
            --target "${GITHUB_SHA}" \
            --title "Mihomo ARMv5 with gVisor ${MIHOMO_REF}" \
            --prerelease \
            --notes "Official MetaCubeX/mihomo ${MIHOMO_REF}, cross-compiled for linux/arm GOARM=5 with the official with_gvisor build tag. Intended for GoshaCrash pure-TUN testing on ASUS RT-AC68U."
