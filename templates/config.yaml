# Безопасный публичный шаблон.
# Настоящий личный config.yaml с серверами и паролями хранится только на роутере.
#
# После установки:
#   goshacrash edit
#   goshacrash apply

mixed-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false

external-controller: 0.0.0.0:9090
secret: "CHANGE_ME"
external-ui: ui

profile:
  store-selected: true
  store-fake-ip: true

# GoshaCrash также принудительно ставит false в runtime.yaml,
# не меняя личный config.yaml.
geo-auto-update: false

dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  default-nameserver:
    - 9.9.9.9
    - 1.1.1.1
  nameserver:
    - tls://1.1.1.1
    - tls://9.9.9.9

tun:
  enable: false

proxies: []

proxy-groups:
  - name: GLOBAL-PROXY
    type: select
    proxies:
      - DIRECT

rules:
  - MATCH,DIRECT
