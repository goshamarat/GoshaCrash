# Безопасный публичный шаблон.
# Настоящий личный config.yaml с серверами и паролями хранится только на роутере.
#
# После установки:
#   goshacrash edit
#   goshacrash apply

mixed-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false

external-controller: 0.0.0.0:9090
secret: "3665"
external-ui: ui

profile:
  store-selected: true
  store-fake-ip: true

# GoshaCrash также принудительно ставит false в runtime.yaml,
# не меняя личный config.yaml.
geo-auto-update: false

dns:
  enable: false

tun:
  enable: false

proxies: []

proxy-groups:
  - name: GLOBAL-PROXY
    type: select
    proxies:
      - DIRECT

rules:
  - MATCH,DIRECT
